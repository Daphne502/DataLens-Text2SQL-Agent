    - data:
        code: "import re\nimport json\nimport requests\n\ndef clean_sql(sql_str: str)\
          \ -> str:\n    sql = sql_str.replace(\"```sql\", \"\").replace(\"```postgresql\"\
          , \"\").replace(\"```\", \"\").strip()\n    return sql.rstrip(\";\").strip()\n\
          \ndef is_safe_select(sql: str) -> bool:\n    normalized = re.sub(r\"\\s+\"\
          , \" \", sql.strip()).upper()\n    forbidden = (\n        \"DROP \", \"\
          DELETE \", \"UPDATE \", \"INSERT \", \"ALTER \",\n        \"TRUNCATE \"\
          , \"CREATE \", \"GRANT \", \"REVOKE \", \"EXEC \",\n    )\n    if any(k\
          \ in normalized for k in forbidden):\n        return False\n    return normalized.startswith(\"\
          SELECT \") or normalized.startswith(\"WITH \")\n\ndef main(sql_str: str,\
          \ supabase_rpc_url: str, supabase_anon_key: str):\n    sql = clean_sql(sql_str)\n\
          \n    if not is_safe_select(sql):\n        return {\n            \"status\"\
          : \"error\",\n            \"raw_sql\": sql,\n            \"result\": \"\
          安全拦截：仅允许 SELECT/WITH 只读查询\",\n        }\n\n    url = (supabase_rpc_url or\
          \ \"\").strip()\n    api_key = (supabase_anon_key or \"\").strip()\n\n \
          \   if not url or not api_key:\n        return {\n            \"status\"\
          : \"error\",\n            \"raw_sql\": sql,\n            \"result\": \"\
          配置错误：缺少 supabase_rpc_url 或 supabase_anon_key 输入变量\",\n        }\n\n    headers\
          \ = {\n        \"apikey\": api_key,\n        \"Authorization\": f\"Bearer\
          \ {api_key}\",\n        \"Content-Type\": \"application/json\",\n    }\n\
          \n    try:\n        response = requests.post(url, headers=headers, json={\"\
          query\": sql}, timeout=15)\n        result_data = response.json()\n\n  \
          \      if isinstance(result_data, dict) and \"error\" in result_data:\n\
          \            return {\n                \"status\": \"error\",\n        \
          \        \"raw_sql\": sql,\n                \"result\": str(result_data[\"\
          error\"]),\n            }\n\n        return {\n            \"status\": \"\
          success\",\n            \"raw_sql\": sql,\n            \"result\": json.dumps(result_data,\
          \ ensure_ascii=False),\n        }\n    except Exception as e:\n        return\
          \ {\n            \"status\": \"error\",\n            \"raw_sql\": sql,\n\
          \            \"result\": str(e),\n        }"
